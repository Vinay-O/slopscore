name: "Bug report"
description: slopscore crashed, hung, or behaved incorrectly
title: "[bug] <short summary>"
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you run, and what went wrong?
      placeholder: "I ran `npx slopscore scan .` and it ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: A command + a minimal file that triggers it, if you can.
      render: shell
  - type: input
    id: version
    attributes:
      label: slopscore version (`slopscore --version`)
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version (`node --version`)
    validations:
      required: true
